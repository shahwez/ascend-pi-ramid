<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ascent of the Pyramid</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://minepi.com"></script>
    <style>
        body { margin: 0; background: #0a0500; color: #d4af37; font-family: 'Segoe UI', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        canvas { background: radial-gradient(circle at top, #1a120b 0%, #000 100%); border: 4px double #d4af37; border-radius: 10px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); }
        #ui { position: absolute; top: 20px; width: 380px; display: flex; justify-content: space-between; font-size: 18px; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .gold-btn { background: #d4af37; color: #000; padding: 15px 35px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>ALTITUDE: <span id="heightText">0</span>m</div>
        <div>BEST: <span id="highScoreText">0</span>m</div>
    </div>
    <div id="overlay">
        <h1 style="color: #d4af37; letter-spacing: 5px;">ASCENT OF THE PYRAMID</h1>
        <p id="status-text" style="color: #fff; margin-bottom: 25px;">Ready to Climb?</p>
        <button id="start-btn" class="gold-btn" onclick="startGame()">START ASCENT</button>
        <button id="pi-btn" class="gold-btn" style="background:#555; color:#fff;" onclick="initPi()">CONNECT PI</button>
        <button id="revive-btn" class="gold-btn" style="display:none; background:#ff4444; color:#fff;" onclick="payToRevive()">REVIVE (0.01 PI)</button>
    </div>
    <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
    <canvas id="gameCanvas"></canvas>

    <script>
        const MY_APP_ID = "PASTE_YOUR_APP_ID_HERE";
        const firebaseConfig = {
            apiKey: "AIzaSyDeaQF-003Hu6EAK4S0hEQyBs77en-YTIU",
            authDomain: "://firebaseapp.com",
            projectId: "pi-ramid-ascent",
            storageBucket: "pi-ramid-ascent.firebasestorage.app",
            appId: "1:889789419959:web:7ff463fca36c02032e9832"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const Pi = window.Pi;
        let currentUser = null;

        async function initPi() {
            try {
                Pi.init({ version: "1.5", sandbox: true });
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                currentUser = auth.user;
                document.getElementById('status-text').innerText = "Logged in as " + currentUser.username;
                document.getElementById('pi-btn').style.display = "none";
            } catch (err) {
                document.getElementById('status-text').innerText = "Guest Mode - Use Pi Browser for Score Sync";
            }
        }

        async function payToRevive() {
            if (!currentUser) return alert("Open in Pi Browser!");
            try {
                await Pi.createPayment({ amount: 0.01, memo: "Revive", metadata: { type: "revive" }}, {
                    onReadyForServerCompletion: (id, txid) => {
                        gameOver = false; document.getElementById('overlay').style.display = 'none';
                        player.y = cameraY + 350; player.vy = -15; audio.play();
                    },
                    onError: (err) => alert("Payment Failed")
                });
            } catch (e) { console.error(e); }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        canvas.width = 400; canvas.height = 600;

        let height = 0, highScore = localStorage.getItem('ascent_top_v3') || 0, gameOver = true;
        const player = { x: 200, y: 500, r: 13, vy: 0, vx: 0 };
        let platforms = [], cameraY = 0, musicStarted = false;
        document.getElementById('highScoreText').innerText = highScore;

        function startGame() {
            if (!musicStarted) { audio.play().catch(()=>{}); musicStarted = true; }
            document.getElementById('overlay').style.display = 'none';
            resetLevel();
        }

        function resetLevel() {
            platforms = []; cameraY = 0; player.x = 200; player.y = 500; player.vy = 0; player.vx = 0;
            gameOver = false; height = 0;
            document.getElementById('revive-btn').style.display = 'none';
            platforms.push({ x: 0, y: 580, w: 400, h: 25 });
            for (let i = 1; i < 10; i++) platforms.push({ x: Math.random() * 300, y: 580 - i * 130, w: 100, h: 18 });
        }

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.vx = ((e.clientX - rect.left) - player.x) * 0.15;
        });

        function update() {
            if (gameOver) return;
            player.x += player.vx; player.vy += 0.42; player.y += player.vy;
            if (player.x < 0) player.x = 400; if (player.x > 400) player.x = 0;

            platforms.forEach(p => {
                if (player.vy > 0 && player.y + player.r > p.y && player.y + player.r < p.y + p.h + 12 && player.x > p.x - 5 && player.x < p.x + p.w + 5) {
                    player.y = p.y - player.r; player.vy = -14.5;
                    let h = Math.floor((580 - p.y) / 10);
                    if (h > height) {
                        height = h;
                        document.getElementById('heightText').innerText = height;
                        if (height > highScore) { highScore = height; localStorage.setItem('ascent_top_v3', highScore); }
                    }
                }
            });

            if (player.y < cameraY + 280) cameraY = player.y - 280;
            if (platforms[platforms.length - 1].y > cameraY - 100) platforms.push({ x: Math.random() * (400 - 80), y: platforms[platforms.length - 1].y - 135, w: Math.max(60, 100 - (height / 8)), h: 18 });
            if (player.y > cameraY + 680) { gameOver = true; audio.pause(); document.getElementById('overlay').style.display = 'flex'; document.getElementById('status-text').innerText = "FINAL: " + height + "m"; document.getElementById('revive-btn').style.display = 'block'; }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 600);
            ctx.save(); ctx.translate(0, -cameraY);
            platforms.forEach(p => { ctx.fillStyle = '#d4af37'; ctx.fillRect(p.x, p.y, p.w, p.h); });
            ctx.shadowBlur = 20; ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            update(); requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
